<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Signup - BloodPrint</title>

<style>

/* BODY BACKGROUND */

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url("/static/images/background2.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
background:#071829;
padding:18px;
text-align:right;
box-shadow:0 3px 10px rgba(0,0,0,0.6);
}

.navbar a{
color:white;
margin:20px;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.navbar a:hover{
color:#ff4b5c;
}


/* CENTER CONTAINER */

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}


/* SIGNUP BOX */

.form-box{
background:linear-gradient(135deg, rgba(255,0,204,0.9), rgba(0,204,255,0.9));
padding:45px;
border-radius:20px;
width:380px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}


/* TITLE */

.form-box h2{
font-size:36px;
margin-bottom:20px;
background:linear-gradient(45deg,#ffffff,#e0e0e0);
-webkit-background-clip:text;
color:transparent;
}


/* INPUT */

input{
width:90%;
padding:12px;
margin:12px;
border:none;
border-radius:8px;
font-size:16px;
}


/* BUTTON */

button{
padding:12px 28px;
margin-top:10px;
background:linear-gradient(45deg,#ff00cc,#00ccff);
border:none;
color:white;
border-radius:25px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}


/* LOGIN LINK */

a{
color:white;
font-weight:bold;
}

a:hover{
color:#ffd1ff;
}

</style>

</head>

<body>


<!-- NAVBAR -->

<div class="navbar">

<a href="/">Home</a>

<a href="/about">About</a>

<a href="/#upload">Get Started</a>

<a href="/login">Login</a>

<a href="/signup">Sign Up</a>

</div>


<!-- SIGNUP FORM -->

<div class="container">

<div class="form-box">

<h2>Create Account</h2>

<form method="POST">

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<p style="margin-top:15px;">Already have account? <a href="/login">Login</a></p>

</div>

</div>

</body>
</html>
